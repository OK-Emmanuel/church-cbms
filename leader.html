<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leader Dashboard — Church CBMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-purple-700 text-white py-4 px-6 shadow sticky top-0 z-10">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">🎂 CBMS Leader</h1>
        <p class="text-xs text-purple-200 mt-0.5">
          Month of <span id="leader-month" class="font-semibold">—</span>
        </p>
      </div>
      <div class="flex items-center gap-4">
        <span id="leader-name" class="text-sm text-purple-200"></span>
        <button id="logout-btn" class="text-sm bg-purple-800 hover:bg-purple-900 px-3 py-1 rounded transition">
          Logout
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <!-- Loading state -->
    <div id="loading" class="text-center py-12 text-gray-400">Loading…</div>

    <!-- No month assigned -->
    <div id="no-month-msg" class="hidden bg-yellow-50 border border-yellow-200 rounded-xl p-8 text-center">
      <p class="text-yellow-700 text-lg font-semibold">No month assigned yet</p>
      <p class="text-yellow-600 text-sm mt-1">Please ask the admin to assign you a birth month.</p>
    </div>

    <!-- Stats -->
    <div id="leader-stats" class="hidden grid grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-2xl font-bold text-purple-600" id="stat-total">—</div>
        <div class="text-xs text-gray-500">Total</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-2xl font-bold text-green-600" id="stat-complete">—</div>
        <div class="text-xs text-gray-500">Complete</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-2xl font-bold text-yellow-500" id="stat-incomplete">—</div>
        <div class="text-xs text-gray-500">Incomplete</div>
      </div>
    </div>

    <!-- Actions -->
    <div id="leader-actions" class="hidden bg-white rounded-xl shadow p-4 mb-4 flex flex-wrap gap-3 items-center">
      <button
        id="add-record-btn"
        class="bg-purple-600 hover:bg-purple-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition"
      >
        + Add Record
      </button>
      <input
        type="text" id="search-input" placeholder="Search by name…"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm flex-1 min-w-40 focus:outline-none focus:ring-2 focus:ring-purple-500"
      />
    </div>

    <!-- Records list -->
    <div id="records-list" class="hidden space-y-3"></div>

  </main>

  <!-- ── Modal: Edit / Add Record ─────────────────────────────────────────── -->
  <div id="record-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 flex">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto">
      <h3 class="text-lg font-bold text-gray-800 mb-4" id="modal-title">Edit Record</h3>
      <form id="record-form" novalidate class="space-y-4">
        <input type="hidden" id="record-id" />

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Full Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text" id="record-name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Date of Birth <span class="text-red-500">*</span>
          </label>
          <input
            type="date" id="record-dob" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Photo</label>
          <div class="flex items-center gap-3">
            <img id="record-photo-preview" class="h-16 w-16 object-cover rounded-lg border hidden" alt="Current photo" />
            <div class="flex-1">
              <input type="file" id="record-photo" accept="image/jpeg,image/png" class="text-sm" />
              <p class="text-xs text-gray-400 mt-1">JPG or PNG · replaces current photo</p>
            </div>
          </div>
        </div>

        <div class="flex gap-3 pt-2">
          <button
            type="button" id="modal-cancel"
            class="flex-1 border border-gray-300 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            type="submit" id="modal-save"
            class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg text-sm font-medium transition disabled:opacity-60"
          >
            Save
          </button>
        </div>

        <p id="modal-message" class="hidden text-sm text-center"></p>
      </form>
    </div>
  </div>

  <script type="module" src="js/leader.js"></script>
</body>
</html>
