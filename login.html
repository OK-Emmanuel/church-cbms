<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Church CBMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🎂</div>
      <h1 class="text-2xl font-bold text-gray-800">Church CBMS</h1>
      <p class="text-gray-500 text-sm mt-1">Staff &amp; Leader Login</p>
    </div>

    <form id="login-form" novalidate class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
        <input
          type="email" id="email" required autocomplete="email"
          placeholder="your@email.com"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input
          type="password" id="password" required autocomplete="current-password"
          placeholder="••••••••"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <button
        type="submit" id="login-btn"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-60 disabled:cursor-not-allowed"
      >
        Sign In
      </button>

      <p id="login-error" class="hidden text-red-500 text-sm text-center"></p>
    </form>

    <div class="mt-5 text-center">
      <a href="index.html" class="text-sm text-purple-600 hover:underline">← Back to Submission Form</a>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
