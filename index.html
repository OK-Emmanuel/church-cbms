<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Submission — Church CBMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-purple-700 text-white py-4 px-6 shadow">
    <div class="max-w-lg mx-auto flex items-center justify-between">
      <h1 class="text-xl font-bold">🎂 Church Birthday Registration</h1>
      <a href="login.html" class="text-sm text-purple-200 hover:text-white transition">Staff Login</a>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-8">

    <!-- Submission Form -->
    <div id="form-container" class="bg-white rounded-2xl shadow-md p-6">
      <h2 class="text-2xl font-semibold text-gray-800 mb-1">Submit Your Birthday</h2>
      <p class="text-gray-500 text-sm mb-6">
        Fill in your details below. Your information is stored once and reused each year.
      </p>

      <form id="submit-form" novalidate class="space-y-5">

        <!-- Full Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="name">
            Full Name <span class="text-red-500">*</span>
          </label>
          <input
            type="text" id="name" name="name" required autocomplete="name"
            placeholder="e.g. John Doe"
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <!-- Date of Birth -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="dob">
            Date of Birth <span class="text-red-500">*</span>
          </label>
          <input
            type="date" id="dob" name="dob" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>

        <!-- Photo Upload -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Photo <span class="text-red-500">*</span>
          </label>
          <div
            id="drop-zone"
            class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-purple-400 transition"
          >
            <input type="file" id="photo" name="photo" accept="image/jpeg,image/png" class="hidden" />
            <div id="upload-placeholder">
              <p class="text-gray-400 text-sm">📷 Click or drag &amp; drop to upload your photo</p>
              <p class="text-gray-300 text-xs mt-1">JPG or PNG · Max 10 MB</p>
            </div>
            <img id="photo-preview" class="hidden mx-auto max-h-48 rounded-lg mt-2" alt="Photo preview" />
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit" id="submit-btn"
          class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-6 rounded-lg transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Submit Registration
        </button>

        <div id="form-message" class="hidden text-sm text-center"></div>
      </form>
    </div>

    <!-- Success State -->
    <div id="success-container" class="hidden bg-white rounded-2xl shadow-md p-8 text-center">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Registration Successful!</h2>
      <p class="text-gray-500 mb-6">Your birthday details have been saved. Thank you!</p>
      <button
        id="submit-another"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-6 rounded-lg transition"
      >
        Submit Another
      </button>
    </div>

  </main>

  <script type="module" src="js/submit.js"></script>
</body>
</html>
